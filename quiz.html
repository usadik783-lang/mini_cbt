<!DOCTYPE html>
<html>
<head>
<title>Quiz</title>
</head>
<body>

<h2>{{ question.text }}</h2>

<form method="POST">

{% for option in question.options %}
<input type="radio" name="answer" value="{{ option }}" required>
<label>{{ option }}</label><br>
{% endfor %}

<br>
<button type="submit">Next</button>

</form>

</body>
</html>
